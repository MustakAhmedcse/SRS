name: salescom

# One stack, one network. The SalesCom API runs as a single container alongside Grafana Loki
# (log aggregation) and Grafana (dashboards); they reach each other by service name.
#
# Persistence: every service's data is bind-mounted to a LOCAL host path under ${DATA_PATH}
#           (default ./volumes, i.e. docker/volumes/). Because these are host directories, the
#           data survives a container crash, restart, recreate or image rebuild — and you can
#           browse it directly on disk. Override the host root with DATA_PATH in a .env file or
#           the environment if you want the data somewhere else (e.g. DATA_PATH=D:/salescom-data).
#
# Database: there is NO database container — the API uses the remote PostgreSQL configured in
#           src/SalesCom.Api/appsettings.json (Database:ConnectionString).
# Central Login (SSO): CentralLogin:BaseUrl is set in appsettings.json to
#           https://salesapptest.banglalink.net.
# Logs: the API ships structured logs to the bundled Loki (http://loki:3100); Grafana is
#           pre-provisioned with Loki as its default data source.
#
# Run from the repo root:   docker compose -f docker/docker-compose.yml up --build
#   API      → http://localhost:8080   (Swagger only in Development; see note below)
#   Grafana  → http://localhost:3000   (admin / admin) — Explore → Loki, query {app="SalesCom"}
#   Loki     → http://localhost:3100
#   UI       → http://localhost:3001

services:
  salescom-api:
    build:
      context: ..                              # repo root — the Dockerfile copies src/ + Directory.*.props
      dockerfile: src/SalesCom.Api/Dockerfile
    image: salescom-api:latest
    container_name: salescom-api
#    user: "1002:1002" #UID:GUID uncomment this for live and change accoring to server 
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"     # set "Production" for live
      ASPNETCORE_URLS: "http://+:8080"
      # --- Docker-specific overrides (everything else comes from appsettings.json) ---
      # The application database is the REMOTE host in appsettings.json; nothing to override here.
      # Ship logs to the Loki service in this stack instead of localhost.
      Observability__LokiUrl: "http://loki:3100"
      Observability__LokiEnabled: "true"
      # The bundled Loki runs without auth — clear the basic-auth credentials from appsettings.
      Observability__LokiUsername: ""
      Observability__LokiPassword: ""
    volumes:
      # Rolling Serilog files → local host path (persists across crashes/rebuilds).
      - ${DATA_PATH:-./volumes}/api-logs:/app/logs
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: salescom-loki
#    user: "1002:1002" #UID:GUID uncomment this for live and change accoring to server 
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      # Ingested chunks + index → local host path (config path_prefix is /loki).
      - ${DATA_PATH:-./volumes}/loki:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: salescom-grafana
#    user: "1002:1002" #UID:GUID uncomment this for live and change accoring to server 
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_DATA: "/var/lib/grafana"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Grafana database (dashboards, prefs, annotations) → local host path.
      - ${DATA_PATH:-./volumes}/grafana:/var/lib/grafana
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped
  frontend:
    image: salescom-frontend:latest
    container_name: salescom-frontend
#    user: "1002:1002" #UID:GUID uncomment this for live and change accoring to server 
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      # Server-only — injected at runtime, never baked into the image. salescom-api
      # shares this stack, so reach it by service name; override via BACKEND_API_URL
      # (e.g. http://host.docker.internal:8080) to point at a backend elsewhere.
      BACKEND_API_URL: ${BACKEND_API_URL:-http://salescom-api:8080}
    env_file:
      - path: .env
        required: false
    extra_hosts:
      # Lets the container resolve the host machine on Linux too.
      - "host.docker.internal:host-gateway"
    depends_on:
      salescom-api:
        condition: service_started
