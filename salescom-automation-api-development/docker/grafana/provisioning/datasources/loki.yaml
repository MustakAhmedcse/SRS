apiVersion: 1

# Auto-provision the Loki data source so Grafana comes up already wired to the bundled Loki.
# 'loki' resolves to the Loki service on the compose network.
datasources:
  - name: Loki
    type: loki
    access: proxy
    uid: salescom-loki
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
